name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Frontend
        run: cd frontend && npm install && npm run build

      - name: Build Windows
        run: |
          wails build -platform windows/amd64 -ldflags "-s -w -X kineticgo/internal/service.Version=${{ github.ref_name }}"
        shell: pwsh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: build/bin/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Frontend
        run: cd frontend && npm install && npm run build

      - name: Build macOS
        run: |
          wails build -platform darwin/universal -ldflags "-s -w -X kineticgo/internal/service.Version=${{ github.ref_name }}"

      - name: Package macOS
        run: |
          cd build/bin
          zip -r KineticGo-macos-universal.zip KineticGo.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: build/bin/*.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-amd64
          path: dist/windows

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-universal
          path: dist/macos

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/windows/*.exe
            dist/macos/*.zip
          generate_release_notes: true
