name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CGO_ENABLED: 1

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install MinGW-w64 (CGO dependency)
        run: choco install mingw -y --no-progress
        shell: pwsh

      - name: Verify toolchain
        run: |
          gcc --version
          go version
          node --version
        shell: pwsh

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Frontend
        run: cd frontend && npm ci && npm run build

      - name: Build Windows (with NSIS installer)
        run: |
          wails build -platform windows/amd64 -nsis -ldflags "-s -w -X kineticgo/internal/service.Version=${{ github.ref_name }}"
        shell: pwsh

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: |
            build/bin/*.exe
            build/bin/*.installer.exe
          if-no-files-found: warn

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Verify toolchain
        run: |
          xcode-select -p
          go version
          node --version

      - name: Clean disk
        run: |
          echo "Before cleanup:"
          df -h
          sudo rm -rf /usr/local/lib/android /usr/local/share/boost /opt/homebrew/Cellar 2>/dev/null || true
          sudo rm -rf /Library/Developer/CoreSimulator/Profiles/Runtimes/* 2>/dev/null || true
          go clean -cache
          rm -rf ~/Library/Developer/Xcode/DerivedData/* 2>/dev/null || true
          echo "After cleanup:"
          df -h

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Frontend
        run: cd frontend && npm ci && npm run build

      - name: Build macOS Universal
        run: |
          wails build -platform darwin/universal -ldflags "-s -w -X kineticgo/internal/service.Version=${{ github.ref_name }}"

      - name: Package macOS .dmg
        run: |
          # Calculate app size and add 20% padding
          APP_SIZE=$(du -sm build/bin/KineticGo.app | cut -f1)
          DMG_SIZE=$((APP_SIZE + (APP_SIZE / 5) + 20))
          echo "App size: ${APP_SIZE}MB, Creating DMG with size: ${DMG_SIZE}MB"
          
          # Create an empty HFS+ DMG
          hdiutil create -size ${DMG_SIZE}m -fs HFS+ -volname "KineticGo" -ov build/bin/tmp.dmg
          
          # Mount the DMG
          hdiutil attach build/bin/tmp.dmg -mountpoint /Volumes/KineticGo
          
          # Copy the app into the DMG
          cp -R build/bin/KineticGo.app /Volumes/KineticGo/
          
          # Detach the DMG
          hdiutil detach /Volumes/KineticGo
          
          # Convert to compressed format
          hdiutil convert build/bin/tmp.dmg -format UDZO -o build/bin/KineticGo-macos-universal.dmg
          rm build/bin/tmp.dmg

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: build/bin/*.dmg

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-amd64
          path: dist/windows

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-universal
          path: dist/macos

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/windows/*.exe
            dist/macos/*.dmg
          generate_release_notes: true
